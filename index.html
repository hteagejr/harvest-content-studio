function buildYouthDirectorMessage(y, meta) {

  var theme = meta && meta.title || "this week's message";
  var L = ["Hi Youth Director, here's this week's Youth Ministry content from Sunday's message on " + theme + ":", ""];
  if (y.devotional) {
    L.push("YOUTH DEVOTIONAL: " + (y.devotional.title || ""));
    (y.devotional.days || []).forEach(function (d) {
      L.push("Day " + d.day + (d.title ? " - " + d.title : ""));
      if (d.reading) L.push(d.reading);
      if (d.reflection) L.push("Reflect: " + d.reflection);
      if (d.prayer) L.push("Prayer: " + d.prayer);
      L.push("");
    });
  }
  if (y.smallGroupYouth) {
    L.push("SMALL GROUP GUIDE (YOUTH):");
    if (y.smallGroupYouth.icebreaker) L.push("Icebreaker: " + y.smallGroupYouth.icebreaker);
    (y.smallGroupYouth.questions || []).forEach(function (q, i) {
      L.push(i + 1 + ". " + q.question + (q.followUp ? " (" + q.followUp + ")" : ""));
    });
    if (y.smallGroupYouth.application) L.push("Application: " + y.smallGroupYouth.application);
    L.push("");
  }
  if (y.socialContent && y.socialContent.length) {
    L.push("SOCIAL CONTENT:");
    y.socialContent.forEach(function (s) {
      L.push(s.platform + ": " + s.text);
    });
    L.push("");
  }
  if (y.weeklyChallenge) {
    L.push("WEEKLY CHALLENGE: " + y.weeklyChallenge, "");
  }
  if (y.parentBrief) L.push("PARENT BRIEF: " + y.parentBrief);
  return L.join("\n");
}
// Feature 5 — formats Children's Ministry content into one paste-ready
// message for the Children's Director.
function buildChildrenDirectorMessage(c, meta) {
  if (!c) return "";
  var theme = meta && meta.title || "this week's message";
  var L = ["Hi Children's Director, here's this week's Children's Ministry content from Sunday's message on " + theme + ":", ""];
  if (c.story) {
    L.push("STORY: " + (c.story.title || ""));
    if (c.story.text) L.push(c.story.text);
    L.push("");
  }
  if (c.lessonOutline) {
    L.push("LESSON OUTLINE:");
    if (c.lessonOutline.openingActivity) L.push("Opening activity: " + c.lessonOutline.openingActivity);
    if (c.lessonOutline.verse) L.push("Verse: " + c.lessonOutline.verse);
    if (c.lessonOutline.storyRecap) L.push("Story recap: " + c.lessonOutline.storyRecap);
    if (c.lessonOutline.applicationQuestion) L.push("Application question: " + c.lessonOutline.applicationQuestion);
    if (c.lessonOutline.closingPrayer) L.push("Closing prayer: " + c.lessonOutline.closingPrayer);
    L.push("");
  }
  if (c.parentGuide && (c.parentGuide.summary || (c.parentGuide.questions && c.parentGuide.questions.length))) {
    L.push("FOR PARENTS:");
    if (c.parentGuide.summary) L.push(c.parentGuide.summary, "");
    if (c.parentGuide.questions && c.parentGuide.questions.length) {
      L.push("Car ride home questions:");
      c.parentGuide.questions.forEach(function (q, i) {
        L.push(i + 1 + ". " + q);
      });
    }
    L.push("");
  }
  if (c.memoryVerse) {
    L.push("MEMORY VERSE: " + (c.memoryVerse.reference || ""));
    if (c.memoryVerse.text) L.push(c.memoryVerse.text);
    if (c.memoryVerse.activity) L.push("Activity: " + c.memoryVerse.activity);
    L.push("");
  }
  if (c.prayerPoints && c.prayerPoints.length) {
    L.push("PRAYER POINTS:");
    c.prayerPoints.forEach(function (p) {
      L.push("- " + p);
    });
  }
  return L.join("\n");
}
